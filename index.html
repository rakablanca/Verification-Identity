<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Verification Animation</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    touch-action: none;
}

.video-container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="video-container">
    <video
        autoplay
        muted
        playsinline
        disablePictureInPicture
        controlslist="nodownload nofullscreen noplaybackrate"
    >
        <source src="Verif_animation.mp4" type="video/mp4">
    </video>
</div>

</body>
</html>
